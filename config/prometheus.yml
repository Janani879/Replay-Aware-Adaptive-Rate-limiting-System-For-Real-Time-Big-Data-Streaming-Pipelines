global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: radar-fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000


  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
