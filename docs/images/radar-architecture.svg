<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="760" viewBox="0 0 1900 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#20223a" />
    </marker>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f46e5" />
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16845b" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .layer { fill: #fffbd7; stroke: #cfc76c; stroke-width: 2; }
      .obsLayer { fill: #eef7ff; stroke: #78a9d6; stroke-width: 2; }
      .box { fill: #edeaff; stroke: #9b92df; stroke-width: 1.8; rx: 5; }
      .api { fill: #eaf7ff; stroke: #78a9d6; stroke-width: 1.8; rx: 5; }
      .store { fill: #e9fff3; stroke: #63b37e; stroke-width: 1.8; rx: 5; }
      .ctrl { fill: #fff0e6; stroke: #e18a49; stroke-width: 1.8; rx: 5; }
      .obs { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; rx: 5; }
      .diamond { fill: #e7e4ff; stroke: #9b92df; stroke-width: 2; }
      .title { font: 700 22px Arial, sans-serif; fill: #20223a; }
      .small { font: 600 14px Arial, sans-serif; fill: #30324f; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #30324f; }
      .label { font: 700 13px Arial, sans-serif; fill: #20223a; }
      .arrow { stroke: #20223a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .blue { stroke: #4f46e5; stroke-width: 2.3; fill: none; marker-end: url(#blueArrow); }
      .green { stroke: #16845b; stroke-width: 2.3; fill: none; marker-end: url(#greenArrow); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1900" height="760" />
  <text x="950" y="38" text-anchor="middle" class="title">RADAR Streaming Platform: Adaptive Replay Control + Live Observability</text>

  <rect x="420" y="92" width="770" height="250" class="layer" />
  <text x="805" y="118" text-anchor="middle" class="label">Streaming Processing Layer</text>

  <rect x="1265" y="88" width="450" height="270" class="layer" />
  <text x="1490" y="114" text-anchor="middle" class="label">Storage + Analytics Layer</text>

  <rect x="1240" y="410" width="500" height="125" class="layer" />
  <text x="1490" y="436" text-anchor="middle" class="label">Adaptive Control Layer</text>

  <rect x="325" y="585" width="1240" height="120" class="obsLayer" />
  <text x="945" y="612" text-anchor="middle" class="label">Operational Observability Layer</text>

  <rect x="55" y="190" width="125" height="50" class="box" />
  <text x="117" y="211" text-anchor="middle" class="small">CSV /</text>
  <text x="117" y="229" text-anchor="middle" class="small">Dashboard</text>

  <line x1="180" y1="215" x2="270" y2="215" class="arrow" />
  <text x="225" y="203" text-anchor="middle" class="tiny">HTTP upload</text>

  <rect x="270" y="190" width="130" height="50" class="api" />
  <text x="335" y="211" text-anchor="middle" class="small">FastAPI</text>
  <text x="335" y="229" text-anchor="middle" class="small">Gateway</text>

  <line x1="400" y1="215" x2="475" y2="215" class="arrow" />
  <text x="438" y="203" text-anchor="middle" class="tiny">accepted</text>

  <polygon points="575,120 665,215 575,310 485,215" class="diamond" />
  <text x="575" y="209" text-anchor="middle" class="small">Kafka</text>
  <text x="575" y="227" text-anchor="middle" class="small">usecase_*</text>

  <line x1="665" y1="215" x2="760" y2="215" class="arrow" />
  <text x="712" y="202" text-anchor="middle" class="tiny">stream read</text>

  <rect x="760" y="190" width="150" height="50" class="box" />
  <text x="835" y="211" text-anchor="middle" class="small">Spark</text>
  <text x="835" y="229" text-anchor="middle" class="small">Structured Streaming</text>

  <line x1="910" y1="215" x2="1008" y2="215" class="arrow" />
  <text x="960" y="202" text-anchor="middle" class="tiny">dedup key</text>

  <rect x="1008" y="190" width="130" height="50" class="box" />
  <text x="1073" y="211" text-anchor="middle" class="small">drop</text>
  <text x="1073" y="229" text-anchor="middle" class="small">duplicates</text>

  <line x1="1138" y1="207" x2="1295" y2="145" class="arrow" />
  <text x="1218" y="158" text-anchor="middle" class="tiny">clean events</text>

  <rect x="1325" y="120" width="140" height="55" class="store" />
  <text x="1395" y="142" text-anchor="middle" class="small">Parquet</text>
  <text x="1395" y="160" text-anchor="middle" class="small">Clean Storage</text>

  <line x1="1138" y1="229" x2="1295" y2="270" class="arrow" />
  <text x="1220" y="268" text-anchor="middle" class="tiny">raw/unique/duplicate</text>

  <rect x="1325" y="245" width="160" height="60" class="store" />
  <text x="1405" y="270" text-anchor="middle" class="small">ClickHouse</text>
  <text x="1405" y="288" text-anchor="middle" class="small">Metrics Store</text>

  <line x1="1405" y1="305" x2="1405" y2="410" class="blue" />
  <text x="1452" y="362" text-anchor="middle" class="tiny">duplicate ratios</text>

  <rect x="1320" y="455" width="170" height="55" class="ctrl" />
  <text x="1405" y="477" text-anchor="middle" class="small">RADAR</text>
  <text x="1405" y="495" text-anchor="middle" class="small">Controller</text>

  <line x1="1320" y1="482" x2="362" y2="242" class="blue" />
  <text x="895" y="379" text-anchor="middle" class="tiny">writes adaptive limits</text>

  <rect x="205" y="282" width="150" height="55" class="ctrl" />
  <text x="280" y="304" text-anchor="middle" class="small">Redis</text>
  <text x="280" y="322" text-anchor="middle" class="small">Token Bucket</text>

  <line x1="335" y1="240" x2="290" y2="282" class="blue" />
  <text x="274" y="258" text-anchor="middle" class="tiny">check</text>

  <line x1="335" y1="282" x2="335" y2="245" class="blue" />
  <text x="374" y="270" text-anchor="middle" class="tiny">allow/block</text>

  <text x="105" y="315" class="tiny">Blocked duplicates never reach Kafka/Spark</text>
  <line x1="205" y1="306" x2="118" y2="306" class="blue dash" />

  <rect x="430" y="630" width="145" height="50" class="obs" />
  <text x="502" y="651" text-anchor="middle" class="small">FastAPI</text>
  <text x="502" y="669" text-anchor="middle" class="small">/metrics</text>

  <rect x="635" y="630" width="145" height="50" class="obs" />
  <text x="707" y="651" text-anchor="middle" class="small">Kafka</text>
  <text x="707" y="669" text-anchor="middle" class="small">Exporter</text>

  <rect x="840" y="630" width="145" height="50" class="obs" />
  <text x="912" y="651" text-anchor="middle" class="small">Redis</text>
  <text x="912" y="669" text-anchor="middle" class="small">Exporter</text>

  <rect x="1080" y="630" width="155" height="50" class="obs" />
  <text x="1158" y="651" text-anchor="middle" class="small">Prometheus</text>
  <text x="1158" y="669" text-anchor="middle" class="small">scrapes 5s</text>

  <rect x="1310" y="630" width="155" height="50" class="obs" />
  <text x="1388" y="651" text-anchor="middle" class="small">Grafana</text>
  <text x="1388" y="669" text-anchor="middle" class="small">Live Evidence</text>

  <line x1="575" y1="310" x2="707" y2="630" class="green dash" />
  <line x1="280" y1="337" x2="912" y2="630" class="green dash" />
  <line x1="335" y1="240" x2="502" y2="630" class="green dash" />
  <line x1="575" y1="680" x2="1080" y2="655" class="green" />
  <line x1="780" y1="655" x2="1080" y2="655" class="green" />
  <line x1="985" y1="655" x2="1080" y2="655" class="green" />
  <line x1="1235" y1="655" x2="1310" y2="655" class="green" />

  <text x="950" y="735" text-anchor="middle" class="tiny">ClickHouse stores detailed research analytics; Prometheus/Grafana show live operational proof of reduced load.</text>
</svg>
