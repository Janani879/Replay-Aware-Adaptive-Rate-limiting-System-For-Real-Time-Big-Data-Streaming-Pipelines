<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="980" viewBox="0 0 1900 980">
  <defs>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f46e5" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16845b" />
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#111827" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px Arial, sans-serif; fill: #64748b; }
      .layer-title { font: 800 15px Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 800 15px Arial, sans-serif; fill: #111827; }
      .box-sub { font: 600 12px Arial, sans-serif; fill: #334155; }
      .tiny { font: 600 12px Arial, sans-serif; fill: #475569; }
      .note { font: 600 13px Arial, sans-serif; fill: #475569; }
      .layer-stream { fill: #fffbd7; stroke: #d6c95d; stroke-width: 2; rx: 8; }
      .layer-store { fill: #fffbd7; stroke: #d6c95d; stroke-width: 2; rx: 8; }
      .layer-control { fill: #fff8d9; stroke: #d6c95d; stroke-width: 2; rx: 8; }
      .layer-obs { fill: #eef7ff; stroke: #60a5fa; stroke-width: 2; rx: 8; }
      .ingest { fill: #eeeaff; stroke: #8b7de8; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .api { fill: #eaf7ff; stroke: #60a5fa; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .kafka { fill: #e9e5ff; stroke: #8b7de8; stroke-width: 2; filter: url(#shadow); }
      .spark { fill: #eeeaff; stroke: #8b7de8; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .store { fill: #e9fff3; stroke: #22a46f; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .redis { fill: #fff1e7; stroke: #f97316; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .radar { fill: #fff1e7; stroke: #f97316; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .obs { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 7; filter: url(#shadow); }
      .arrow { stroke: #111827; stroke-width: 2.2; fill: none; marker-end: url(#arrowDark); }
      .blue { stroke: #4f46e5; stroke-width: 2.6; fill: none; marker-end: url(#arrowBlue); }
      .green { stroke: #16845b; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1900" height="980" />
  <text x="950" y="48" text-anchor="middle" class="title">RADAR Streaming Platform</text>
  <text x="950" y="75" text-anchor="middle" class="subtitle">Adaptive Replay-Aware Rate Limiting + Live Prometheus/Grafana Observability</text>

  <rect x="420" y="132" width="770" height="270" class="layer-stream" />
  <text x="805" y="160" text-anchor="middle" class="layer-title">Streaming Processing Layer</text>

  <rect x="1265" y="128" width="450" height="285" class="layer-store" />
  <text x="1490" y="156" text-anchor="middle" class="layer-title">Storage + Analytics Layer</text>

  <rect x="1265" y="505" width="450" height="130" class="layer-control" />
  <text x="1490" y="533" text-anchor="middle" class="layer-title">Adaptive Control Layer</text>

  <rect x="260" y="735" width="1360" height="140" class="layer-obs" />
  <text x="940" y="763" text-anchor="middle" class="layer-title">Operational Observability Layer</text>

  <!-- Ingestion path -->
  <rect x="60" y="242" width="125" height="58" class="ingest" />
  <text x="122" y="266" text-anchor="middle" class="box-title">CSV /</text>
  <text x="122" y="286" text-anchor="middle" class="box-title">Dashboard</text>

  <line x1="185" y1="271" x2="270" y2="271" class="arrow" />
  <text x="228" y="257" text-anchor="middle" class="tiny">HTTP upload</text>

  <rect x="270" y="242" width="135" height="58" class="api" />
  <text x="337" y="266" text-anchor="middle" class="box-title">FastAPI</text>
  <text x="337" y="286" text-anchor="middle" class="box-title">Gateway</text>

  <line x1="405" y1="271" x2="475" y2="271" class="arrow" />
  <text x="440" y="257" text-anchor="middle" class="tiny">accepted</text>

  <polygon points="575,154 665,271 575,388 485,271" class="kafka" />
  <text x="575" y="264" text-anchor="middle" class="box-title">Kafka</text>
  <text x="575" y="284" text-anchor="middle" class="box-title">usecase_*</text>

  <line x1="665" y1="271" x2="745" y2="271" class="arrow" />
  <text x="705" y="257" text-anchor="middle" class="tiny">stream read</text>

  <rect x="745" y="242" width="155" height="58" class="spark" />
  <text x="823" y="265" text-anchor="middle" class="box-title">Spark</text>
  <text x="823" y="285" text-anchor="middle" class="box-title">Structured Streaming</text>

  <line x1="900" y1="271" x2="980" y2="271" class="arrow" />
  <text x="940" y="257" text-anchor="middle" class="tiny">dedup key</text>

  <rect x="980" y="242" width="145" height="58" class="spark" />
  <text x="1052" y="265" text-anchor="middle" class="box-title">drop</text>
  <text x="1052" y="285" text-anchor="middle" class="box-title">duplicates</text>

  <!-- Storage routes -->
  <path d="M1125 256 C1180 215, 1222 198, 1265 182" class="arrow" />
  <text x="1195" y="204" text-anchor="middle" class="tiny">clean events</text>

  <rect x="1325" y="180" width="160" height="62" class="store" />
  <text x="1405" y="205" text-anchor="middle" class="box-title">Parquet</text>
  <text x="1405" y="225" text-anchor="middle" class="box-title">Clean Storage</text>

  <path d="M1125 286 C1190 327, 1228 340, 1265 342" class="arrow" />
  <text x="1200" y="333" text-anchor="middle" class="tiny">raw / unique / duplicate</text>

  <rect x="1325" y="315" width="170" height="66" class="store" />
  <text x="1410" y="341" text-anchor="middle" class="box-title">ClickHouse</text>
  <text x="1410" y="361" text-anchor="middle" class="box-title">Metrics Store</text>

  <!-- Control loop -->
  <path d="M1410 381 L1410 505" class="blue" />
  <text x="1467" y="454" text-anchor="middle" class="tiny">duplicate ratios</text>

  <rect x="1330" y="555" width="160" height="60" class="radar" />
  <text x="1410" y="579" text-anchor="middle" class="box-title">RADAR</text>
  <text x="1410" y="599" text-anchor="middle" class="box-title">Controller</text>

  <path d="M1330 586 C1040 520, 680 430, 405 300" class="blue" />
  <text x="890" y="494" text-anchor="middle" class="tiny">writes adaptive limits</text>

  <rect x="215" y="355" width="155" height="60" class="redis" />
  <text x="292" y="379" text-anchor="middle" class="box-title">Redis</text>
  <text x="292" y="399" text-anchor="middle" class="box-title">Token Bucket</text>

  <path d="M335 300 L302 355" class="blue" />
  <text x="282" y="331" text-anchor="middle" class="tiny">check</text>
  <path d="M292 355 L330 300" class="blue" />
  <text x="365" y="333" text-anchor="middle" class="tiny">allow / block</text>

  <path d="M215 385 L115 385" class="blue dash" />
  <text x="153" y="372" text-anchor="middle" class="tiny">blocked before Kafka</text>

  <!-- Observability sources -->
  <rect x="365" y="790" width="145" height="58" class="obs" />
  <text x="438" y="814" text-anchor="middle" class="box-title">FastAPI</text>
  <text x="438" y="834" text-anchor="middle" class="box-title">/metrics</text>

  <rect x="585" y="790" width="145" height="58" class="obs" />
  <text x="658" y="814" text-anchor="middle" class="box-title">Kafka</text>
  <text x="658" y="834" text-anchor="middle" class="box-title">Exporter</text>

  <rect x="805" y="790" width="145" height="58" class="obs" />
  <text x="878" y="814" text-anchor="middle" class="box-title">Redis</text>
  <text x="878" y="834" text-anchor="middle" class="box-title">Exporter</text>

  <rect x="1055" y="790" width="165" height="58" class="obs" />
  <text x="1138" y="814" text-anchor="middle" class="box-title">Prometheus</text>
  <text x="1138" y="834" text-anchor="middle" class="box-title">scrapes 5s</text>

  <rect x="1300" y="790" width="165" height="58" class="obs" />
  <text x="1382" y="814" text-anchor="middle" class="box-title">Grafana</text>
  <text x="1382" y="834" text-anchor="middle" class="box-title">Live Evidence</text>

  <!-- Observability routes, kept below main flow -->
  <path d="M337 300 C350 475, 378 640, 438 790" class="green dash" />
  <path d="M575 388 C590 535, 620 665, 658 790" class="green dash" />
  <path d="M292 415 C420 560, 650 705, 878 790" class="green dash" />

  <path d="M510 819 L585 819" class="green" />
  <path d="M730 819 L805 819" class="green" />
  <path d="M950 819 L1055 819" class="green" />
  <path d="M1220 819 L1300 819" class="green" />

  <!-- Legend -->
  <rect x="60" y="885" width="1780" height="54" fill="#f8fafc" stroke="#e2e8f0" rx="8" />
  <line x1="110" y1="912" x2="180" y2="912" class="arrow" />
  <text x="195" y="916" class="note">event/data flow</text>
  <line x1="375" y1="912" x2="445" y2="912" class="blue" />
  <text x="460" y="916" class="note">RADAR feedback control</text>
  <line x1="690" y1="912" x2="760" y2="912" class="green dash" />
  <text x="775" y="916" class="note">metrics export</text>
  <text x="1025" y="916" class="note">ClickHouse stores detailed research analytics; Prometheus/Grafana show live operational proof of reduced load.</text>
</svg>
