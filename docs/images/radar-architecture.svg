<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="520" viewBox="0 0 1800 520">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#20223a" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f46e5" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .layer { fill: #fffbd7; stroke: #cfc76c; stroke-width: 2; }
      .box { fill: #edeaff; stroke: #9b92df; stroke-width: 1.8; rx: 4; }
      .box2 { fill: #eaf7ff; stroke: #78a9d6; stroke-width: 1.8; rx: 4; }
      .store { fill: #e9fff3; stroke: #63b37e; stroke-width: 1.8; rx: 4; }
      .ctrl { fill: #fff0e6; stroke: #e18a49; stroke-width: 1.8; rx: 4; }
      .diamond { fill: #e7e4ff; stroke: #9b92df; stroke-width: 2; }
      .cylinder { fill: #efeaff; stroke: #9b92df; stroke-width: 1.8; }
      .title { font: 700 18px Arial, sans-serif; fill: #20223a; }
      .small { font: 500 13px Arial, sans-serif; fill: #30324f; }
      .tiny { font: 500 11px Arial, sans-serif; fill: #30324f; }
      .label { font: 600 12px Arial, sans-serif; fill: #20223a; }
      .arrow { stroke: #20223a; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .blueArrow { stroke: #4f46e5; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="520" />

  <text x="900" y="34" text-anchor="middle" class="title">RADAR Streaming Platform Architecture</text>

  <!-- Layers -->
  <rect x="470" y="78" width="710" height="220" class="layer" />
  <text x="825" y="102" text-anchor="middle" class="label">Processing Layer</text>

  <rect x="1295" y="62" width="390" height="250" class="layer" />
  <text x="1490" y="88" text-anchor="middle" class="label">Storage + Analytics Layer</text>

  <rect x="1255" y="342" width="430" height="120" class="layer" />
  <text x="1470" y="366" text-anchor="middle" class="label">Adaptive Control Layer</text>

  <!-- Left ingestion -->
  <rect x="55" y="166" width="104" height="44" class="box" />
  <text x="107" y="193" text-anchor="middle" class="small">CSV / Dashboard</text>

  <line x1="159" y1="188" x2="250" y2="188" class="arrow" />
  <text x="205" y="178" text-anchor="middle" class="tiny">HTTP upload</text>

  <rect x="250" y="166" width="120" height="44" class="box2" />
  <text x="310" y="193" text-anchor="middle" class="small">FastAPI Gateway</text>

  <line x1="370" y1="188" x2="470" y2="188" class="arrow" />
  <text x="420" y="178" text-anchor="middle" class="tiny">accepted events</text>

  <!-- Processing -->
  <polygon points="575,82 665,188 575,294 485,188" class="diamond" />
  <text x="575" y="180" text-anchor="middle" class="small">Kafka</text>
  <text x="575" y="198" text-anchor="middle" class="small">usecase_* topics</text>

  <line x1="665" y1="188" x2="750" y2="188" class="arrow" />
  <text x="708" y="176" text-anchor="middle" class="tiny">stream read</text>

  <rect x="750" y="166" width="150" height="44" class="box" />
  <text x="825" y="193" text-anchor="middle" class="small">Spark Streaming</text>

  <line x1="900" y1="188" x2="1000" y2="188" class="arrow" />
  <text x="950" y="176" text-anchor="middle" class="tiny">1. generate key</text>

  <rect x="1000" y="166" width="130" height="44" class="box" />
  <text x="1065" y="193" text-anchor="middle" class="small">dedup_key</text>

  <line x1="1130" y1="188" x2="1225" y2="188" class="arrow" />
  <text x="1178" y="176" text-anchor="middle" class="tiny">2. dropDuplicates</text>

  <rect x="1225" y="166" width="130" height="44" class="box" />
  <text x="1290" y="193" text-anchor="middle" class="small">Clean Stream</text>

  <!-- Storage -->
  <line x1="1355" y1="174" x2="1425" y2="116" class="arrow" />
  <text x="1388" y="134" text-anchor="middle" class="tiny">Route 1: clean events</text>

  <path d="M1430 104 C1430 91 1526 91 1526 104 L1526 152 C1526 165 1430 165 1430 152 Z" class="store" />
  <ellipse cx="1478" cy="104" rx="48" ry="13" class="store" />
  <text x="1478" y="134" text-anchor="middle" class="small">Parquet</text>
  <text x="1478" y="151" text-anchor="middle" class="small">Clean Storage</text>

  <line x1="1355" y1="202" x2="1428" y2="232" class="arrow" />
  <text x="1392" y="224" text-anchor="middle" class="tiny">Route 2: metrics</text>

  <path d="M1430 212 C1430 199 1532 199 1532 212 L1532 260 C1532 273 1430 273 1430 260 Z" class="store" />
  <ellipse cx="1481" cy="212" rx="51" ry="13" class="store" />
  <text x="1481" y="242" text-anchor="middle" class="small">ClickHouse</text>
  <text x="1481" y="259" text-anchor="middle" class="small">Duplicate Metrics</text>

  <!-- Control -->
  <line x1="1481" y1="273" x2="1481" y2="342" class="blueArrow" />
  <text x="1532" y="315" text-anchor="middle" class="tiny">query ratios</text>

  <rect x="1400" y="382" width="160" height="44" class="ctrl" />
  <text x="1480" y="409" text-anchor="middle" class="small">RADAR Controller</text>

  <line x1="1400" y1="404" x2="1230" y2="404" class="blueArrow" />
  <text x="1315" y="392" text-anchor="middle" class="tiny">adaptive limit</text>

  <rect x="1080" y="382" width="150" height="44" class="ctrl" />
  <text x="1155" y="400" text-anchor="middle" class="small">Redis Client</text>
  <text x="1155" y="417" text-anchor="middle" class="small">Limits</text>

  <!-- Feedback to gateway -->
  <path d="M1080 404 L310 404 L310 220" class="blueArrow dash" />
  <text x="656" y="392" text-anchor="middle" class="tiny">feedback: throttle replay-heavy clients before Kafka</text>

  <!-- Redis check near gateway -->
  <rect x="245" y="250" width="130" height="44" class="ctrl" />
  <text x="310" y="268" text-anchor="middle" class="small">Redis Token</text>
  <text x="310" y="286" text-anchor="middle" class="small">Bucket Check</text>
  <line x1="310" y1="250" x2="310" y2="210" class="blueArrow" />

  <!-- Notes -->
  <text x="82" y="456" class="tiny">Experiment modes: No Rate Limiting | Static Token Bucket | Storage-only Dedup | RADAR Adaptive</text>
  <text x="82" y="478" class="tiny">RADAR reduces future Kafka/Spark load by learning duplicate-heavy clients from ClickHouse metrics.</text>
</svg>
