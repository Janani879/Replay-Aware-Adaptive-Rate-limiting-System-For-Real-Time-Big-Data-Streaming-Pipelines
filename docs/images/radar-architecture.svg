<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f46e5" />
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16845b" />
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #64748b; }
      .section { font: 800 15px Arial, sans-serif; fill: #334155; letter-spacing: .3px; }
      .box-title { font: 800 16px Arial, sans-serif; fill: #111827; }
      .box-sub { font: 600 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Arial, sans-serif; fill: #475569; }
      .note { font: 600 13px Arial, sans-serif; fill: #475569; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; rx: 18; }
      .ingest { fill: #f1f5ff; stroke: #818cf8; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .api { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .redis { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .kafka { fill: #f4f0ff; stroke: #8b5cf6; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .spark { fill: #f4f0ff; stroke: #8b5cf6; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .store { fill: #ecfdf5; stroke: #22c55e; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .radar { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .obs { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .arrow { stroke: #111827; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .blue { stroke: #4f46e5; stroke-width: 2.6; fill: none; marker-end: url(#blueArrow); }
      .green { stroke: #16845b; stroke-width: 2.5; fill: none; marker-end: url(#greenArrow); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="900" />
  <text x="900" y="48" text-anchor="middle" class="title">RADAR Streaming Platform Architecture</text>
  <text x="900" y="76" text-anchor="middle" class="subtitle">Replay-aware adaptive rate limiting with Kafka, Spark, ClickHouse, Redis, Prometheus, and Grafana</text>

  <!-- Main pipeline panel -->
  <rect x="60" y="125" width="1680" height="230" class="panel" />
  <text x="90" y="155" class="section">1. Event Ingestion and Stream Processing</text>

  <rect x="100" y="205" width="145" height="72" class="ingest" />
  <text x="172" y="232" text-anchor="middle" class="box-title">CSV Upload</text>
  <text x="172" y="253" text-anchor="middle" class="box-sub">Dashboard / API</text>

  <line x1="245" y1="241" x2="320" y2="241" class="arrow" />
  <text x="282" y="224" text-anchor="middle" class="tiny">HTTP</text>

  <rect x="320" y="205" width="145" height="72" class="api" />
  <text x="392" y="232" text-anchor="middle" class="box-title">FastAPI</text>
  <text x="392" y="253" text-anchor="middle" class="box-sub">gateway</text>

  <line x1="465" y1="241" x2="545" y2="241" class="arrow" />
  <text x="505" y="224" text-anchor="middle" class="tiny">per-client check</text>

  <rect x="545" y="205" width="155" height="72" class="redis" />
  <text x="622" y="232" text-anchor="middle" class="box-title">Redis</text>
  <text x="622" y="253" text-anchor="middle" class="box-sub">token bucket</text>

  <line x1="700" y1="241" x2="780" y2="241" class="arrow" />
  <text x="740" y="224" text-anchor="middle" class="tiny">accepted only</text>

  <rect x="780" y="205" width="155" height="72" class="kafka" />
  <text x="857" y="232" text-anchor="middle" class="box-title">Kafka</text>
  <text x="857" y="253" text-anchor="middle" class="box-sub">usecase_* topics</text>

  <line x1="935" y1="241" x2="1015" y2="241" class="arrow" />
  <text x="975" y="224" text-anchor="middle" class="tiny">stream</text>

  <rect x="1015" y="205" width="170" height="72" class="spark" />
  <text x="1100" y="232" text-anchor="middle" class="box-title">Spark</text>
  <text x="1100" y="253" text-anchor="middle" class="box-sub">structured streaming</text>

  <line x1="1185" y1="241" x2="1265" y2="241" class="arrow" />
  <text x="1225" y="224" text-anchor="middle" class="tiny">dedup key</text>

  <rect x="1265" y="205" width="160" height="72" class="spark" />
  <text x="1345" y="232" text-anchor="middle" class="box-title">Dedup</text>
  <text x="1345" y="253" text-anchor="middle" class="box-sub">drop duplicates</text>

  <line x1="1425" y1="241" x2="1510" y2="241" class="arrow" />
  <text x="1468" y="224" text-anchor="middle" class="tiny">clean stream</text>

  <rect x="1510" y="205" width="165" height="72" class="store" />
  <text x="1592" y="232" text-anchor="middle" class="box-title">Parquet</text>
  <text x="1592" y="253" text-anchor="middle" class="box-sub">clean events</text>

  <!-- Analytics and feedback panel -->
  <rect x="60" y="405" width="1680" height="210" class="panel" />
  <text x="90" y="435" class="section">2. Duplicate Analytics and RADAR Feedback Control</text>

  <rect x="820" y="480" width="180" height="74" class="store" />
  <text x="910" y="507" text-anchor="middle" class="box-title">ClickHouse</text>
  <text x="910" y="528" text-anchor="middle" class="box-sub">duplicate metrics</text>

  <rect x="1135" y="480" width="180" height="74" class="radar" />
  <text x="1225" y="507" text-anchor="middle" class="box-title">RADAR</text>
  <text x="1225" y="528" text-anchor="middle" class="box-sub">adaptive controller</text>

  <rect x="1450" y="480" width="180" height="74" class="redis" />
  <text x="1540" y="507" text-anchor="middle" class="box-title">Redis Limits</text>
  <text x="1540" y="528" text-anchor="middle" class="box-sub">next upload protected</text>

  <path d="M1345 277 L1345 365 L910 365 L910 480" class="arrow" />
  <text x="1108" y="350" text-anchor="middle" class="tiny">raw, unique, duplicate counts</text>

  <line x1="1000" y1="517" x2="1135" y2="517" class="blue" />
  <text x="1068" y="500" text-anchor="middle" class="tiny">duplicate ratios</text>

  <line x1="1315" y1="517" x2="1450" y2="517" class="blue" />
  <text x="1382" y="500" text-anchor="middle" class="tiny">new limits</text>

  <path d="M1540 480 L1540 390 L622 390 L622 277" class="blue" />
  <text x="1040" y="378" text-anchor="middle" class="tiny">feedback loop updates enforcement before Kafka</text>

  <path d="M545 288 L250 288" class="blue dash" />
  <text x="395" y="315" text-anchor="middle" class="tiny">blocked replay traffic stops here</text>

  <!-- Observability panel -->
  <rect x="60" y="665" width="1680" height="150" class="panel" />
  <text x="90" y="695" class="section">3. Live Operational Evidence</text>

  <rect x="260" y="725" width="270" height="62" class="obs" />
  <text x="395" y="749" text-anchor="middle" class="box-title">Metrics Sources</text>
  <text x="395" y="770" text-anchor="middle" class="box-sub">FastAPI / Kafka exporter / Redis exporter</text>

  <line x1="530" y1="756" x2="690" y2="756" class="green" />
  <text x="610" y="739" text-anchor="middle" class="tiny">scraped every 5s</text>

  <rect x="690" y="725" width="190" height="62" class="obs" />
  <text x="785" y="749" text-anchor="middle" class="box-title">Prometheus</text>
  <text x="785" y="770" text-anchor="middle" class="box-sub">time-series metrics</text>

  <line x1="880" y1="756" x2="1040" y2="756" class="green" />
  <text x="960" y="739" text-anchor="middle" class="tiny">visualized</text>

  <rect x="1040" y="725" width="200" height="62" class="obs" />
  <text x="1140" y="749" text-anchor="middle" class="box-title">Grafana</text>
  <text x="1140" y="770" text-anchor="middle" class="box-sub">live evidence dashboard</text>

  <rect x="1320" y="715" width="300" height="82" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="10" />
  <text x="1470" y="739" text-anchor="middle" class="box-title">Demo Evidence</text>
  <text x="1470" y="762" text-anchor="middle" class="box-sub">Accepted vs blocked events</text>
  <text x="1470" y="782" text-anchor="middle" class="box-sub">Adaptive limits and duplicate ratios</text>

  <!-- Legend -->
  <rect x="60" y="842" width="1680" height="44" fill="#f8fafc" stroke="#e2e8f0" rx="10" />
  <line x1="110" y1="864" x2="175" y2="864" class="arrow" />
  <text x="190" y="868" class="note">event/data flow</text>
  <line x1="390" y1="864" x2="455" y2="864" class="blue" />
  <text x="470" y="868" class="note">RADAR feedback control</text>
  <line x1="730" y1="864" x2="795" y2="864" class="green" />
  <text x="810" y="868" class="note">observability metrics</text>
  <text x="1120" y="868" class="note">ClickHouse gives detailed experiment analytics; Prometheus/Grafana gives live system-load proof.</text>
</svg>
