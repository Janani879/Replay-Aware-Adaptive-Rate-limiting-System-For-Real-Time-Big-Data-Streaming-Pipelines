services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: radar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: radar-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2
    container_name: radar-redis
    ports:
      - "6380:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: radar-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: radar
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: radar-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: radar-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  spark:
    image: apache/spark:3.5.1-python3
    container_name: radar-spark
    depends_on:
      - kafka
    ports:
      - "4040:4040"
    volumes:
      - ./spark:/opt/spark/app
    command: tail -f /dev/null