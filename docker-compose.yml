services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: radar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: radar-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2
    container_name: radar-redis
    ports:
      - "6380:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: radar-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: radar
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: radar-kafka-exporter
    depends_on:
      - kafka
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: radar-redis-exporter
    depends_on:
      - redis
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: radar-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: radar-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  spark:
    image: apache/spark:3.5.1-python3
    container_name: radar-spark
    depends_on:
      - kafka
    ports:
      - "4040:4040"
    volumes:
      - ./spark:/opt/spark/app
    command: tail -f /dev/null

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: radar-prometheus
    depends_on:
      - kafka
      - redis
      - clickhouse
      - kafka-exporter
      - redis-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: radar-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
